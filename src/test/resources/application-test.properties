spring.datasource.url=jdbc:sqlite:${java.io.tmpdir}/snapmemoria-test.db
spring.datasource.driver-class-name=org.sqlite.JDBC

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

snapmemoria.thumbnail.directory=${java.io.tmpdir}/snapmemoria-test-thumbnails
snapmemoria.thumbnail.max-width=480
snapmemoria.thumbnail.max-height=480
snapmemoria.ffmpeg.path=ffmpeg
snapmemoria.thumbnail.video-seek-seconds=1