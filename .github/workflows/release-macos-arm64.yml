name: Release macOS Apple Silicon

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-macos-arm64-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release-macos-arm64:
    name: Build and publish notarized macOS Apple Silicon release
    runs-on: macos-14

    env:
      HUSKY: 0
      MACOS_NOTARIZATION_ARTIFACT_DIR: dist/notarization
      MACOS_ENTITLEMENTS_PATH: packaging/macos/entitlements/memoria-vault.entitlements.plist

    steps:
      - name: Check out pushed tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Verify Apple Silicon runner
        run: |
          set -euo pipefail
          arch="$(uname -m)"
          echo "GitHub Actions runner architecture: ${arch}"
          if [ "${arch}" != "arm64" ]; then
            echo "::error::This workflow must run on an Apple Silicon macOS runner. The selected runner reported '${arch}'."
            exit 1
          fi

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install root tooling dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Validate tag and Maven version
        id: version
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if ! printf '%s\n' "${tag}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$'; then
            echo "::error::Release tags must use semantic version format such as v0.1.0 or v0.1.0-beta.1."
            exit 1
          fi

          release_version="${tag#v}"
          base_version="${release_version%%-*}"
          maven_version="$(./mvnw -q -DforceStdout help:evaluate -Dexpression=project.version)"

          if [ "${maven_version}" != "${release_version}" ] \
            && [ "${maven_version}" != "${release_version}-SNAPSHOT" ] \
            && [ "${maven_version}" != "${base_version}-SNAPSHOT" ]; then
            echo "::error::Maven project version is not compatible with release tag."
            exit 1
          fi

          prerelease=false
          if printf '%s\n' "${release_version}" | grep -q -- '-'; then
            prerelease=true
          fi

          {
            echo "release_version=${release_version}"
            echo "release_asset_name=Memoria-Vault-${release_version}-macos-arm64.dmg"
            echo "release_dmg=dist/installers/Memoria-Vault-${release_version}-macos-arm64.dmg"
            echo "prerelease=${prerelease}"
          } >> "${GITHUB_OUTPUT}"

      - name: Run quality checks
        run: make verify

      - name: Import Developer ID certificate
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_DEVELOPER_ID_APPLICATION: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION }}
        run: |
          set -euo pipefail

          CERTIFICATE_PATH="${RUNNER_TEMP}/developer-id-application.p12"
          KEYCHAIN_PATH="${RUNNER_TEMP}/memoria-vault-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          printf '%s' "${APPLE_CERTIFICATE_P12_BASE64}" | base64 --decode > "${CERTIFICATE_PATH}"

          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"

          security import "${CERTIFICATE_PATH}" \
            -k "${KEYCHAIN_PATH}" \
            -P "${APPLE_CERTIFICATE_PASSWORD}" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          if [ -f "${HOME}/Library/Keychains/login.keychain-db" ]; then
            security list-keychains -d user -s "${KEYCHAIN_PATH}" "${HOME}/Library/Keychains/login.keychain-db"
          else
            security list-keychains -d user -s "${KEYCHAIN_PATH}"
          fi
          security default-keychain -d user -s "${KEYCHAIN_PATH}"

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "${KEYCHAIN_PASSWORD}" \
            "${KEYCHAIN_PATH}" >/dev/null

          security find-identity -v -p codesigning "${KEYCHAIN_PATH}"

          security find-identity -v -p codesigning "${KEYCHAIN_PATH}" \
            | grep -F "${APPLE_DEVELOPER_ID_APPLICATION}" \
            || {
              echo "Expected Developer ID signing identity was not imported into the temporary keychain."
              echo "Check that APPLE_CERTIFICATE_P12_BASE64 contains a .p12 exported with its private key and that APPLE_CERTIFICATE_PASSWORD is correct."
              exit 1
            }

          {
            echo "KEYCHAIN_PATH=${KEYCHAIN_PATH}"
            echo "APPLE_CODESIGN_KEYCHAIN=${KEYCHAIN_PATH}"
            echo "APPLE_KEYCHAIN_PATH=${KEYCHAIN_PATH}"
            echo "APPLE_CERTIFICATE_PATH=${CERTIFICATE_PATH}"
          } >> "${GITHUB_ENV}"

      - name: Build production JAR
        run: make build-production

      - name: Build unsigned macOS app
        run: make package-macos-app

      - name: Verify signing identity
        env:
          APPLE_DEVELOPER_ID_APPLICATION: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION }}
          KEYCHAIN_PATH: ${{ runner.temp }}/memoria-vault-signing.keychain-db
        run: |
          set -euo pipefail

          echo "Checking expected Developer ID signing identity."

          security find-identity -v -p codesigning "${KEYCHAIN_PATH}" \
            | grep -F "${APPLE_DEVELOPER_ID_APPLICATION}" \
            || {
              echo "Expected Developer ID signing identity is unavailable in the temporary keychain."
              echo "Check that APPLE_CERTIFICATE_P12_BASE64 contains a .p12 exported with its private key and that APPLE_CERTIFICATE_PASSWORD is correct."
              exit 1
            }

      - name: Sign embedded SQLite native code
        env:
          APPLE_DEVELOPER_ID_APPLICATION: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          KEYCHAIN_PATH: ${{ runner.temp }}/memoria-vault-signing.keychain-db
          MACOS_SIGNING_SUMMARY_DIR: dist/notarization
        run: make postprocess-macos-sqlite-native-libs

      - name: Sign embedded code
        env:
          APPLE_DEVELOPER_ID_APPLICATION: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION }}
          KEYCHAIN_PATH: ${{ runner.temp }}/memoria-vault-signing.keychain-db
        run: make sign-macos-app

      - name: Verify app signatures
        env:
          APPLE_DEVELOPER_ID_APPLICATION: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MACOS_SIGNING_SUMMARY_DIR: dist/notarization
        run: |
          set -euo pipefail
          mkdir -p "${MACOS_NOTARIZATION_ARTIFACT_DIR}"
          echo "Packaged app JAR candidates:"
          find "dist/app/Memoria Vault.app/Contents/app" \
            -maxdepth 1 \
            -type f \
            -name '*.jar' \
            -exec basename {} \;
          make verify-macos-signatures | tee "${MACOS_NOTARIZATION_ARTIFACT_DIR}/signature-verification-summary.txt"

      - name: Create signed DMG
        env:
          APPLE_DEVELOPER_ID_APPLICATION: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MACOS_DMG_PATH: ${{ steps.version.outputs.release_dmg }}
        run: make package-macos-dmg-from-signed-app

      - name: Sign DMG
        env:
          APPLE_DEVELOPER_ID_APPLICATION: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION }}
          KEYCHAIN_PATH: ${{ runner.temp }}/memoria-vault-signing.keychain-db
          MACOS_DMG_PATH: ${{ steps.version.outputs.release_dmg }}
        run: |
          set -euo pipefail
          make sign-macos-dmg
          mkdir -p "${MACOS_NOTARIZATION_ARTIFACT_DIR}"
          codesign --verify --strict --verbose=2 "${MACOS_DMG_PATH}" >/dev/null
          printf '%s\n' "DMG signature: signed-valid" > "${MACOS_NOTARIZATION_ARTIFACT_DIR}/dmg-signature-verification.txt"

      - name: Verify mounted DMG signatures
        env:
          APPLE_DEVELOPER_ID_APPLICATION: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MACOS_DMG_PATH: ${{ steps.version.outputs.release_dmg }}
          MACOS_SIGNING_SUMMARY_DIR: dist/notarization
        run: make verify-macos-dmg-signatures

      - name: Notarize macOS DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          MACOS_DMG_PATH: ${{ steps.version.outputs.release_dmg }}
        run: make notarize-macos-dmg

      - name: Staple notarization ticket
        env:
          MACOS_DMG_PATH: ${{ steps.version.outputs.release_dmg }}
        run: make staple-macos-dmg

      - name: Verify notarized release artifact
        env:
          MACOS_DMG_PATH: ${{ steps.version.outputs.release_dmg }}
        run: make verify-macos-notarization

      - name: Generate checksum
        env:
          MACOS_DMG_PATH: ${{ steps.version.outputs.release_dmg }}
        run: make checksum-macos-dmg

      - name: Write release notes introduction
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.release_version }}"
          cat > release-notes-intro.md <<EOF
          ## Memoria Vault for macOS Apple Silicon

          Memoria Vault runs locally on your Mac. Your compatible exported memories are not uploaded to a cloud service.

          This application is an independent, open-source local tool and is not affiliated, associated, authorized, endorsed by, or in any way officially connected with Snap Inc. or Snapchat.

          ### Installation

          1. Download \`Memoria-Vault-${version}-macos-arm64.dmg\`.
          2. Open the DMG.
          3. Drag Memoria Vault to Applications.
          4. Open Memoria Vault.
          5. Choose your exported archive folder and start a local scan.

          ### Requirements

          - macOS on Apple Silicon
          - A compatible exported memories archive folder

          ### Release integrity

          - The DMG is signed with Developer ID, notarized by Apple, stapled, and verified before publication.
          - The SHA-256 checksum is generated after stapling.

          EOF

      - name: Publish GitHub Release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PRERELEASE: ${{ steps.version.outputs.prerelease }}
          RELEASE_DMG: ${{ steps.version.outputs.release_dmg }}
        run: |
          set -euo pipefail
          checksum="${RELEASE_DMG}.sha256"
          test -f "${RELEASE_DMG}"
          test -f "${checksum}"

          prerelease_flag=""
          if [ "${PRERELEASE}" = "true" ]; then
            prerelease_flag="--prerelease"
          fi

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "${RELEASE_DMG}" "${checksum}" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" \
              "${RELEASE_DMG}" \
              "${checksum}" \
              --title "Memoria Vault ${GITHUB_REF_NAME}" \
              --notes-file release-notes-intro.md \
              --generate-notes \
              ${prerelease_flag}
          fi

      - name: Upload notarization diagnostics
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: memoria-vault-macos-notarization-${{ github.ref_name }}
          path: |
            dist/notarization/
          if-no-files-found: ignore
          retention-days: 14

      - name: Clean up signing materials
        if: always()
        run: |
          set -euo pipefail

          CERTIFICATE_PATH="${RUNNER_TEMP}/developer-id-application.p12"
          KEYCHAIN_PATH="${RUNNER_TEMP}/memoria-vault-signing.keychain-db"

          rm -f "${CERTIFICATE_PATH}"

          if security list-keychains -d user | grep -q "$(basename "${KEYCHAIN_PATH}")"; then
            security delete-keychain "${KEYCHAIN_PATH}" || true
          fi
